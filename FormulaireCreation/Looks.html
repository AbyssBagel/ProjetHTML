<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width">
  <title>Formulaire Création Perso</title>
  <link href="style.css" rel="stylesheet" type="text/css" />
</head>

<body>

  <form action="Looks.php" method="post">

    Age: <input type="number" name="age" id="age" min="0"
      onkeydown="if (event.key === 'Enter') { event.preventDefault(); }"> <br>
    Height: <input type="number" name="height" id="height" min="0"
      onkeydown="if (event.key === 'Enter') { event.preventDefault(); }"> <br>
    Weight: <input type="number" name="weight" id="weight" min="0"
      onkeydown="if (event.key === 'Enter') { event.preventDefault(); }"> <br>
    Eye Color: <input type="text" name="eyeColor" id="eyeColor"
      onkeydown="if (event.key === 'Enter') { event.preventDefault(); }"> <br>
    Skin Color: <input type="text" name="skinColor" id="skinColor"
      onkeydown="if (event.key === 'Enter') { event.preventDefault(); }"> <br>
    Hair Color: <input type="text" name="hairColor" id="hairColor"
      onkeydown="if (event.key === 'Enter') { event.preventDefault(); }"> <br>


    <button type="submit" onclick="document.forms[0].submit()">Create Character</button>
  </form>
  <script src="script.js"></script>
</body>

</html>
